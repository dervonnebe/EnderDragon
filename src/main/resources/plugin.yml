name: EnderDragen
version: '${version}'
main: org.feuchte.enderDragen.EnderDragen
api-version: '1.21'
prefix: DVN
authors: [ Jack F. <jackfeuchte@outlook.de> ]
website: "https://github.com/dervonnebe/EnderDragon"

commands:
  dragon:
    description: EnderDragon commands
    usage: /<command> [stats|setchance|resetstats|reload]
    aliases: [ed, enderdragon]

permissions:
  enderdragon.admin:
    description: Admin commands for EnderDragon
    default: op
  enderdragon.stats:
    description: Allows viewing the statistics GUI
    default: true
